services:
  redis:
    image: redis:7-alpine
    container_name: realtime-rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - rag_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: realtime-rag-backend
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      - VECTOR_DB_PATH=${VECTOR_DB_PATH:-/data/chroma}
      - MODEL_NAME=${MODEL_NAME:-gemma3:1b}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8000}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - chroma_data:/data/chroma
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rag_network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: realtime-rag-worker
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - VECTOR_DB_PATH=${VECTOR_DB_PATH:-/data/chroma}
      - MODEL_NAME=${MODEL_NAME:-gemma3:1b}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    command: ["python", "-m", "worker.worker"]
    volumes:
      - ./backend:/app
      - chroma_data:/data/chroma
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rag_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: realtime-rag-frontend
    environment:
      - VITE_BACKEND_HTTP_URL=http://localhost:8000
      - VITE_BACKEND_WS_URL=ws://localhost:8000/query
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - rag_network

volumes:
  redis_data:
  chroma_data:

networks:
  rag_network:
    driver: bridge
